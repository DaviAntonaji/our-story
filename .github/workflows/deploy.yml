name: Deploy to SFTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          remote_path: ${{ secrets.SFTP_DIR }}
          local_path: './dist/'
          sftp_only: true
          delete_remote: true

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"hosts":["ourstory.antonaji.com.br"]}' \
            | tee /tmp/cf_purge.json
          if [ "$(cat /tmp/cf_purge.json | python3 -c "import sys,json; print(json.load(sys.stdin)['success'])")" != "True" ]; then
            echo "Cloudflare purge FAILED"
            cat /tmp/cf_purge.json
            exit 1
          fi
          echo "Cloudflare cache purged successfully"
